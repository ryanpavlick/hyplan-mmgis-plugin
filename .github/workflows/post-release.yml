name: Post-release housekeeping

# Triggers on every released tag (vX.Y.Z, no pre-release suffix)
# and bumps two files on main:
#
#   * SECURITY.md "Supported versions" table — regenerated from the
#     full set of release tags; the new minor X.Y.x is the supported
#     line, earlier minors of the same major series get a "use X.Y.x"
#     pointer.
#   * CITATION.cff "version:" field — set to the bare X.Y.Z.
#
# A single commit covers both files.  No commit is made if neither
# file changed (e.g. when release.yml already bumped CITATION.cff
# before tagging).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  post-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # need tags + history for table generation

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate SECURITY.md supported-versions table
        env:
          TAG: ${{ github.ref_name }}
        run: |
          python <<'PY'
          import os, re, subprocess

          version = os.environ["TAG"].lstrip("v")
          major, minor, _patch = version.split(".")
          supported_minor = f"{major}.{minor}"
          supported_label = f"{supported_minor}.x"

          out = subprocess.check_output(["git", "tag"], text=True)
          tag_re = re.compile(r"^v?(\d+)\.(\d+)\.(\d+)$")
          tags = [m.group(0).lstrip("v") for line in out.split()
                  if (m := tag_re.match(line))]
          minors = {f"{t.split('.')[0]}.{t.split('.')[1]}" for t in tags}
          minors.add(supported_minor)
          # Sort by (major, minor) descending so the new line lands at top.
          minors_sorted = sorted(
              minors, key=lambda x: tuple(int(p) for p in x.split(".")), reverse=True
          )

          # Same major as the supported one — show all of them with a
          # pointer.  Older majors collapse into a single ":x:" row.
          supported_major = major
          rows = [
              "| Version  | Supported          |",
              "|----------|--------------------|",
          ]
          older_majors_present = False
          for m in minors_sorted:
              m_major = m.split(".")[0]
              label = f"{m}.x"
              if m_major != supported_major:
                  older_majors_present = True
                  continue
              if m == supported_minor:
                  rows.append(f"| {label:<8} | :white_check_mark: |")
              else:
                  rows.append(f"| {label:<8} | :x: (use {supported_label})    |")
          if older_majors_present or supported_major != "0":
              rows.append(f"| < {supported_major}.0    | :x:                |")
          new_table = "\n".join(rows) + "\n"

          with open("SECURITY.md") as f:
              content = f.read()

          pattern = re.compile(
              r"\| Version  \| Supported          \|\n"
              r"\|----------\|--------------------\|\n"
              r"(?:\|.*\|\n)+",
              re.MULTILINE,
          )
          if not pattern.search(content):
              raise SystemExit("Could not locate supported-versions table in SECURITY.md")

          new_content = pattern.sub(new_table, content, count=1)
          if new_content == content:
              print("SECURITY.md already up to date.")
          else:
              with open("SECURITY.md", "w") as f:
                  f.write(new_content)
              print(f"SECURITY.md updated for {supported_label}.")
          PY

      - name: Bump CITATION.cff version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=${TAG#v}
          sed -i "s/^version: .*/version: ${VERSION}/" CITATION.cff
          echo "CITATION.cff version set to ${VERSION}."

      - name: Commit and push
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- SECURITY.md CITATION.cff; then
            echo "No post-release changes; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SECURITY.md CITATION.cff
          git commit -m "post-release: bump SECURITY.md + CITATION.cff for ${TAG}"
          git push origin main
