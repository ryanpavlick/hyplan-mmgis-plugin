name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Python service: lint and import smoke -------------------------------
  service:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check out HyPlan
        uses: actions/checkout@v6
        with:
          repository: ryanpavlick/hyplan
          path: hyplan
          fetch-depth: 0

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Match the runtime install path: install hyplan (with winds extras
          # so the wind endpoints' imports resolve), then service deps,
          # then test deps.
          pip install -e "./hyplan[winds]"
          pip install -r service/requirements.txt
          pip install -r tests/requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check service

      - name: TEMP — dump hyplan namespace
        run: |
          python -c "
          import hyplan, sys
          print('hyplan __file__:', hyplan.__file__)
          print('hyplan.aircraft in sys.modules:', 'hyplan.aircraft' in sys.modules)
          print('hyplan dir (no _):', sorted(k for k in dir(hyplan) if not k.startswith('_')))
          print()
          # Try the explicit attribute access path that __init__.py uses.
          try:
              from hyplan.aircraft import NASA_GV as _NG
              print('aircraft.NASA_GV:', _NG)
          except Exception as e:
              print('aircraft.NASA_GV failed:', type(e).__name__, e)
          # Now try to manually re-run the binding from __init__.py
          import importlib
          a = importlib.import_module('hyplan.aircraft')
          print('manual aircraft module:', a)
          print('manual NASA_GV on it:', hasattr(a, 'NASA_GV'))
          # Maybe hyplan.__init__ was interrupted; show __init__ source size
          import os
          src = os.path.join(os.path.dirname(hyplan.__file__), '__init__.py')
          print('init.py exists:', os.path.isfile(src), 'size:', os.path.getsize(src) if os.path.isfile(src) else None)
          with open(src) as f:
              text = f.read()
          # Check if the aircraft import line is even in the file
          print('init.py contains \"NASA_GV,\":', 'NASA_GV,' in text)
          print('init.py contains \"from .aircraft import\":', 'from .aircraft import' in text)
          "

      - name: Pytest
        # Per-router test suite under tests/routers/.  Uses FastAPI's
        # TestClient (no uvicorn process), so it's fast and covers the
        # 26 service endpoints + the error classifier.
        run: pytest tests -v --tb=short

      - name: Service start smoke
        # Start uvicorn, hit /health and /aircraft and /sensors, stop.
        # Catches lifespan handler regressions and bad imports that only
        # surface at startup.
        env:
          HYPLAN_CAMPAIGNS_DIR: /tmp/hyplan-campaigns
        run: |
          mkdir -p "$HYPLAN_CAMPAIGNS_DIR"
          python -m uvicorn service.app:app --host 127.0.0.1 --port 8100 \
            --log-level warning &
          SERVICE_PID=$!
          # Wait up to 30s for the service to become reachable.
          for i in $(seq 1 60); do
            if curl -fs http://127.0.0.1:8100/health >/dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          set -e
          curl -fs http://127.0.0.1:8100/health   | python -m json.tool
          curl -fs http://127.0.0.1:8100/aircraft | python -c "import json,sys; d=json.load(sys.stdin); assert len(d['aircraft'])>0"
          curl -fs http://127.0.0.1:8100/sensors  | python -c "import json,sys; d=json.load(sys.stdin); assert len(d['sensors'])>0"
          kill $SERVICE_PID

  # --- Frontend MMGIS tool: lint + config sanity ---------------------------
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dev dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint (ESLint)
        # @eslint/js recommended rules — catches undefined vars, unused
        # declarations, unreachable code, etc.  Warnings are intentionally
        # non-blocking (existing file has a handful of intentionally
        # dormant references); errors fail the build.
        run: npm run lint

      - name: Unit tests (vitest)
        # Pure-helper tests for mmgis-tool/HyPlan/helpers.js — no
        # MMGIS host, no DOM.  Fast (~250 ms locally for ~20 tests).
        run: npm test

      - name: Validate MMGIS tool config.json
        # config.json is consumed by MMGIS at startup; a syntax slip is a
        # silent tool-load failure inside MMGIS, so we re-parse it here.
        run: npm run validate:config

  # --- Service Docker image build smoke -----------------------------------
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check out HyPlan
        uses: actions/checkout@v6
        with:
          repository: ryanpavlick/hyplan
          path: hyplan
          fetch-depth: 0

      - name: Build service image
        run: docker build -t hyplan-mmgis-service:ci ./service

      - name: Run image and hit /health
        # The image expects /hyplan to be a mounted HyPlan source tree.
        run: |
          docker run -d --name hyplan-svc \
            -p 8100:8100 \
            -v "$GITHUB_WORKSPACE/hyplan:/hyplan:ro" \
            -e HYPLAN_CAMPAIGNS_DIR=/tmp/hyplan-campaigns \
            hyplan-mmgis-service:ci
          # Give entrypoint.sh time to pip-install hyplan before uvicorn binds.
          for i in $(seq 1 120); do
            if curl -fs http://127.0.0.1:8100/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fs http://127.0.0.1:8100/health | python -m json.tool
          docker logs hyplan-svc | tail -50
          docker rm -f hyplan-svc
