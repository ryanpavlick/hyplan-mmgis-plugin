# Jekyll config for the hyplan-mmgis-plugin documentation site.
#
# Theme: Just the Docs (https://just-the-docs.com).  GitHub Pages
# builds via .github/workflows/docs.yml using the canonical
# just-the-docs gem so we're not pinned to the github-pages-gem
# version of the theme.

title: hyplan-mmgis-plugin
description: >-
  MMGIS plugin for interactive flight planning with HyPlan.
  Documentation, walkthrough, and API reference.
url: "https://ryanpavlick.github.io"
baseurl: "/hyplan-mmgis-plugin"

remote_theme: just-the-docs/just-the-docs

# Search across all pages.
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Repo metadata used by the theme's header.
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/ryanpavlick/hyplan-mmgis-plugin"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

aux_links:
  "GitHub":
    - "https://github.com/ryanpavlick/hyplan-mmgis-plugin"

# Sidebar footer / mast
heading_anchors: true
footer_content: >-
  hyplan-mmgis-plugin &middot;
  <a href="https://github.com/ryanpavlick/hyplan-mmgis-plugin/blob/main/LICENSE.md">Apache 2.0</a>

# Just-the-Docs callout support
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

color_scheme: light

# Markdown / plugins
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Plugins available on GitHub Pages.
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Skip the agent-onboarding docs and machinery from the site build.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .jekyll-cache/
  - _site/
